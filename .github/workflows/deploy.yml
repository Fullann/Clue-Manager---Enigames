name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🏗️ Construire l'application (Build frontend)
        run: npm run build

      - name: 📁 Préparer les fichiers de production
        run: |
          mkdir deploy_prod
          cp -r dist deploy_prod/
          cp server.ts deploy_prod/
          cp package.json deploy_prod/
          cp package-lock.json deploy_prod/

      - name: 🚀 Envoyer les fichiers via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          local-dir: ./deploy_prod/
          server-dir: /app/
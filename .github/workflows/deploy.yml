name: Build & Deploy to FTPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_prod
          cp -r dist deploy_prod/
          cp server.js deploy_prod/
          cp package.json deploy_prod/
          cp package-lock.json deploy_prod/
          cp -r node_modules deploy_prod/
          cp .env.example deploy_prod/
          mkdir -p deploy_prod/uploads

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy_prod
          path: deploy_prod

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy_prod
          path: deploy_prod

      - name: Deploy via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          protocol: ftps
          local-dir: deploy_prod/
          server-dir: ${{ secrets.APP_PATH }}/
          dangerous-clean-slate: false

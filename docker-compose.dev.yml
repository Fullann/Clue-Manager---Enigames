services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: change-me-for-local-tests
      ADMIN_PASSWORD: admin123
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: clue_user
      MYSQL_PASSWORD: clue_password
      MYSQL_DATABASE: clue_manager
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
